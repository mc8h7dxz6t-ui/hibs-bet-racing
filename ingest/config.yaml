region: GB
race_types:
- flat
date_range:
  start: '2024-05-09'
  end: '2024-05-15'
paths:
  raw_csv_dir: data/raw
  parquet_dir: data/parquet
  db_path: data/feature_store.sqlite
  model_dir: data/models
ingest:
  required_columns:
  - race_id
  - race_date
  - horse_id
  - finish_pos
  - comment
  optional_columns:
  - course
  - region
  - race_type
  - distance_f
  - going
  - field_size
  - sp_decimal
  results_require_comment: false
nlp:
  min_comment_length: 8
  target_tag_coverage: 0.9
backtest:
  train_end: '2026-04-30'
  test_start: '2026-05-01'
  place_cutoff_default: 3
ranker:
  combo_alpha: 8.0
  min_rows: 500
  min_races: 50
  scoring_mode: auto
  production_scoring_mode: ranker
  win_prob_calibration: true
  calibration_file: win_prob_isotonic.json
  model_file: lgbm_ranker.txt
  feature_file: lgbm_ranker_features.json
  enrich_feature_file: lgbm_ranker_features_enrich.json
  manifest_file: ranker_manifest.json
  use_enrich_features: auto
  min_enrich_coverage_pct: 5.0
  min_holdout_top1_enrich: 0.28
batch_enrich_recovery:
  target_coverage_pct: 95.0
paper:
  min_place_ev: 0.05
  min_combo_bayes_place: 0.22
  harville_longshot_win_prob_threshold: 0.03
  harville_longshot_discount: 0.85
  default_place_fraction: 0.25
  default_places: 3
  exchange_commission: 0.02
  kelly_fraction: 0.25
  max_runner_risk_pct: 0.02
  exchange_ev_min_coverage_pct: 50
  exchange_ev_min_settled: 100
  default_stake: 1.0
  sync_ledger_on_score: true
  log_on_refresh: true
  min_data_quality_pct: 95
  display_loose_min_data_quality_pct: 60
  display_loose_steam_gates:
  - proceed
  - scale_up
  - scale_down
  - unknown
  display_top_n: 6
  enforce_steam_gate: true
  allowed_steam_gates:
  - proceed
  - scale_up
  - unknown
  value_gates_enabled: true
  exempt_unrated_races: true
  require_official_rating_for_value: true
  min_official_rating: 45
  suitability_gates_enabled: true
  min_horse_dist_runs: 3
  block_zero_dist_wins: true
  max_trip_change_f: 2.0
  max_form_poor_runs_3: 3
  min_trainer_rtf: null
  snapshots:
    persist_on_score: true
  slippage_stress_bps:
  - 0
  - 25
  - 50
  regression:
    min_card_days: 7
    min_gate1_roi_delta_pp: 0.0
    min_gate1_hit_rate_delta_pp: 0.0
  gate2:
    enabled: true
    min_confidence: 0.55
    small_field_max: 7
    large_field_min: 12
    min_place_ev_small: 0.04
    min_place_ev_medium: 0.05
    min_place_ev_large: 0.07
    min_combo_small: 0.2
    min_combo_medium: 0.22
    min_combo_large: 0.25
    price_shock_per_decimal: 0.01
    min_stressed_place_ev: 0.0
    max_value_per_race: 2
    max_value_per_meeting: 6
paper_lanes:
  recommended_paper_lane: gate3
  smart_picks_lane: gate3
  live_promotion: false
  gate3_anchor:
    enabled: true
    lane: gate3
    flag_col: flag_gate3
gate_closure:
  recommended_paper_lane: gate3
  live_promotion: false
  note: Replay-only until slippage sample >= 300 and scoring hash stable
experimental_replay_lanes:
  promotion_criteria:
    min_picks_per_month_gate5: 15
    min_aggregate_roi_pct: 10.0
    min_months_beat_gate2: 6
    min_months_beat_gate3: 6
    min_gate_data_density_pct: 85.0
  gate5_sniper:
    min_official_rating: 60
    min_trainer_rtf: 15
    gate2:
      min_confidence: 0.65
      min_stressed_place_ev: 0.05
      max_value_per_race: 1
      max_value_per_meeting: 2
    exempt_unrated_races: true
  gate6_market_bounded:
    min_official_rating: 50
    min_trainer_rtf: 10
    gate2:
      min_confidence: 0.6
      min_stressed_place_ev: 0.02
      min_win_decimal: 2.0
      max_win_decimal: 10.0
      max_value_per_race: 2
      max_value_per_meeting: 4
    exempt_unrated_races: true
  gate7_true_sniper:
    min_official_rating: 65
    min_trainer_rtf: 20
    min_confidence: 0.65
    min_stressed_place_ev: 0.05
    max_value_per_race: 1
    max_value_per_meeting: 1
    exempt_unrated_races: true
  gate8_regime_blend:
    base_lane: gate3
    trigger_confidence: 0.7
    default_max_value_per_race: 2
    default_max_value_per_meeting: 4
    escalated_max_value_per_race: 1
    escalated_max_value_per_meeting: 2
    exempt_unrated_races: true
  gate3:
    exempt_unrated_races: true
institutional:
  infrastructure:
    wal_mode: true
    busy_timeout_ms: 30000
    sqlite_connect_timeout_sec: 30
    cron_fd_limit: 4096
    job_lock_name: daily_refresh
  telemetry_balance:
    min_matchbook_coverage: 0.5
    min_matchbook_coverage_obs: 0.35
    max_total_ms: 120000
    min_fetch_ms: 50
    min_odds_ms: 10
    max_score_share_pct: 92
    max_odds_share_pct: 45
analytics:
  mode: true
cards:
  default_region: gb
  fetch_timeout_sec: 120
  parallel_workers: 4
  include_tomorrow: true
  primary_date_only: true
  dual_source_enrich: true
  enrich_fetch_stats: true
rate_limits:
  racing_api_pause_sec: 1.5
  racing_api_429_pause_sec: 8.0
  racing_api_429_retries: 4
  rp_scrape_day_pause_sec: 4.0
  rp_racecard_region_pause_sec: 5.0
  rp_verdict_race_pause_sec: 1.2
  rp_verdict_workers: 2
  rp_verdict_max_races: 40
  oddschecker_pause_sec: 1.5
monitor:
  top_n: 10
  value_lane_top_n: 8
  sniper_lane_top_n: 6
  min_field_size: 3
  min_combo_place: 0.35
  min_model_place_prob: 0.45
  one_per_race: true
  auto_refresh_seconds: 300
  card_source: racing_api
  card_day: 1
  window_hours: 24
oddschecker:
  enabled: true
  base_url: https://www.oddschecker.com
  default_source: auto
  auto_scrape: false
  backup_on_exchange_fail: true
  retail_only: true
  default_place_fraction: 0.25
  default_places: 3
  request_pause_sec: 1.5
exchange_profiling:
  enabled: true
  min_coverage_ratio: 0.8
  min_races_before_vps: 300
  poll_milestones:
    baseline: baseline
    pre_race_30m: pre_race_30m
  weekly_report_path: reports/weekly_gate_efficacy.md
