# Backfill config — run on Mac or tiny VPS, not /opt/hibs-bet football box.

region: GB
race_types:
  - flat
  # - jumps
  # - aw

date_range:
  start: "2024-05-09"
  end: "2024-05-15"

paths:
  raw_csv_dir: data/raw
  parquet_dir: data/parquet
  db_path: data/feature_store.sqlite
  model_dir: data/models

ingest:
  # Required CSV columns (map aliases in csv_loader if your export differs)
  required_columns:
    - race_id
    - race_date
    - horse_id
    - finish_pos
    - comment
  optional_columns:
    - course
    - region
    - race_type
    - distance_f
    - going
    - field_size
    - sp_decimal
  results_require_comment: false      # false → ingest all finishes for settlement

nlp:
  min_comment_length: 8
  target_tag_coverage: 0.90

backtest:
  train_end: "2026-04-30"
  test_start: "2026-05-01"
  place_cutoff_default: 3

ranker:
  combo_alpha: 8.0
  min_rows: 500
  min_races: 50
  model_file: lgbm_ranker.txt
  feature_file: lgbm_ranker_features.json
  enrich_feature_file: lgbm_ranker_features_enrich.json
  manifest_file: ranker_manifest.json
  use_enrich_features: auto          # auto | true | false — auto matches booster to manifest
  min_enrich_coverage_pct: 5.0        # raw DB coverage required for --with-enrich train
  min_holdout_top1_enrich: 0.28      # enforced with train-ranker --save-stable-hash

# Batch historical enrich recovery (dense snapshot window)
batch_enrich_recovery:
  start: "2025-11-01"
  end: "2026-05-22"
  target_coverage_pct: 5.0           # stop early once raw mean coverage clears this
  fetch_timeout_sec: 300
  fetch_stats: true
  backup_derived: true               # raceform PIT fallback when RP API fails
  checkpoint_file: batch_scrape_checkpoint.txt
  progress_file: batch_enrich_recovery_progress.json
  scoring_mode: auto  # auto | ranker | heuristic
  production_scoring_mode: ranker  # enforced when HIBS_RACING_PRODUCTION=1

# Production stack: gate1 (DQ 75%, steam, OR/suitability) + gate2 (regime EV/combo, caps).
paper:
  min_place_ev: 0.05
  min_combo_bayes_place: 0.22
  harville_longshot_win_prob_threshold: 0.03
  harville_longshot_discount: 0.85
  default_place_fraction: 0.25
  default_places: 3
  default_stake: 1.0
  sync_ledger_on_score: true         # prune stale paper rows whenever card_scores refresh
  log_on_refresh: true                # refresh-cards / API refresh logs value picks
  min_data_quality_pct: 75            # Gate1: same floor as Smart Portfolio / digest (hash-versioned)
  enforce_steam_gate: true            # Gate1: block abort; unknown OK for morning Matchbook batch
  allowed_steam_gates: [proceed, scale_up, unknown]
  # Actionability gates (ranker still scores all runners; value/paper only when allowed)
  value_gates_enabled: true
  exempt_unrated_races: true          # maidens/novices → rank-only, not missing data
  require_official_rating_for_value: true
  min_official_rating: 45              # handicaps below this OR → no value flag
  suitability_gates_enabled: true
  min_horse_dist_runs: 3
  block_zero_dist_wins: true
  max_trip_change_f: 2.0
  max_form_poor_runs_3: 3              # block when ≥3 poor codes in form (PU/F/UR…) last 3
  min_trainer_rtf: null                # optional e.g. 8 — cold yard gate
  snapshots:
    persist_on_score: true             # replay snapshots on web score-card + refresh
  slippage_stress_bps: [0, 25, 50]     # benchmark-gates slippage stress lanes
  regression:
    min_card_days: 7
    min_gate1_roi_delta_pp: 0.0        # CI: gate1 ROI must be >= none by this margin
    min_gate1_hit_rate_delta_pp: 0.0
  gate2:
    enabled: true                      # production: gate1 (DQ/steam/OR) + gate2 regime/caps
    min_confidence: 0.55               # data completeness confidence (0..1)
    small_field_max: 7
    large_field_min: 12
    min_place_ev_small: 0.04
    min_place_ev_medium: 0.05
    min_place_ev_large: 0.07
    min_combo_small: 0.20
    min_combo_medium: 0.22
    min_combo_large: 0.25
    price_shock_per_decimal: 0.01      # stress EV by odds size
    min_stressed_place_ev: 0.0
    max_value_per_race: 2              # optional concentration control
    max_value_per_meeting: 6
  # Value picks auto-logged when refresh-cards runs with --paper (daily_refresh.sh)

# Replay-only experimental lanes (Gate3–8). Never applied to production paper until promoted.
experimental_replay_lanes:
  promotion_criteria:
    min_picks_per_month_gate5: 15      # below → too thin for statistical meaning
    min_aggregate_roi_pct: 10.0        # fb9402-era upgrade bar vs Gate3
    min_months_beat_gate2: 6           # of dense months with Gate2 picks
    min_months_beat_gate3: 6           # required to claim upgrade over Gate3
    min_gate_data_density_pct: 85.0    # gate-coverage-audit floor before re-testing Gate5/7
  gate5_sniper:
    min_official_rating: 60
    min_trainer_rtf: 15
    gate2:
      min_confidence: 0.65
      min_stressed_place_ev: 0.05
      max_value_per_race: 1
      max_value_per_meeting: 2
  gate6_market_bounded:
    min_official_rating: 50
    min_trainer_rtf: 10
    gate2:
      min_confidence: 0.60
      min_stressed_place_ev: 0.02
      min_win_decimal: 2.0
      max_win_decimal: 10.0
      max_value_per_race: 2
      max_value_per_meeting: 4
  gate7_true_sniper:
    min_official_rating: 65
    min_trainer_rtf: 20
    min_confidence: 0.65
    min_stressed_place_ev: 0.05
    max_value_per_race: 1
    max_value_per_meeting: 1
  gate8_regime_blend:
    base_lane: gate3
    trigger_confidence: 0.70
    default_max_value_per_race: 2
    default_max_value_per_meeting: 4
    escalated_max_value_per_race: 1
    escalated_max_value_per_meeting: 2

institutional:
  infrastructure:
    wal_mode: true                    # PRAGMA journal_mode=WAL on every connect()
    busy_timeout_ms: 30000            # writer waits for readers (dry-run + refresh overlap)
    sqlite_connect_timeout_sec: 30
    cron_fd_limit: 4096               # ulimit -n in cron_refresh_wrapper.sh
    job_lock_name: daily_refresh      # exclusive lock under data/locks/
  telemetry_balance:
    min_matchbook_coverage: 0.50       # production: Matchbook priced / card runners
    min_matchbook_coverage_obs: 0.35   # observation lane (Jun 4–10)
    max_total_ms: 120000               # daily refresh SLA (ms)
    min_fetch_ms: 50                   # Racing API must contribute fetch time
    min_odds_ms: 10                    # Matchbook odds stage must run
    max_score_share_pct: 92            # score dominates but should not be 100% with no odds
    max_odds_share_pct: 45             # odds pass should not swamp API budget alone

analytics:
  mode: true
  # Batch-only: morning odds at daily_refresh; no live exchange routing or polling.

cards:
  default_region: gb
  fetch_timeout_sec: 120
  parallel_workers: 4
  include_tomorrow: false             # window refresh: today only (set true for tomorrow card)
  primary_date_only: true             # drop older/tomorrow dates after hour filter
  dual_source_enrich: true            # Racing API spine + RP null-only merge
  enrich_fetch_stats: true            # RP stats accordion (course/dist/going, jockey 14d)

# Outbound pacing — protects Racing API + Racing Post credentials (env overrides below).
rate_limits:
  racing_api_pause_sec: 1.5           # between region/day API calls (2 req/s plan cap)
  racing_api_429_pause_sec: 8.0
  racing_api_429_retries: 4
  rp_scrape_day_pause_sec: 4.0        # between rpscrape result days (live scrape)
  rp_racecard_region_pause_sec: 5.0   # between gb/ire racecard enrich fetches
  rp_verdict_race_pause_sec: 1.2      # per race page when fetching verdict text
  rp_verdict_workers: 2               # keep low — enrich already hits RP racecards
  rp_verdict_max_races: 20            # cap verdict HTTP fetches per refresh
  oddschecker_pause_sec: 1.5

monitor:
  top_n: 10
  min_field_size: 3
  min_combo_place: 0.35
  min_model_place_prob: 0.45
  one_per_race: true
  auto_refresh_seconds: 300
  card_source: racing_api
  card_day: 1
  window_hours: 24

oddschecker:
  enabled: true
  base_url: https://www.oddschecker.com
  default_source: auto          # auto | oddschecker | csv | none
  auto_scrape: false              # when auto + no embedded prices, try Oddschecker
  retail_only: true               # exclude Betfair/Matchbook exchange columns
  default_place_fraction: 0.25
  default_places: 3
  request_pause_sec: 1.5

exchange_profiling:
  enabled: true
  min_coverage_ratio: 0.80          # manifest warning if Matchbook prices < 80% of card
  min_races_before_vps: 300         # keep Mac-local until slippage ledger has 300+ races
  poll_milestones:
    baseline: baseline                # daily_refresh.sh @ ~06:00
    pre_race_30m: pre_race_30m        # scripts/intraday_poll_30m.sh
  weekly_report_path: reports/weekly_gate_efficacy.md

matchbook:
  enabled: true
  event_time_tolerance_sec: 120       # ±2 min off-time vs card for event pairing
  event_near_miss_sec: 600            # log venue match with 2–10 min skew for alias tuning
  login_base: https://api.matchbook.com/bpapi/rest
  api_base: https://api.matchbook.com/edge/rest
  sport_id: 24735152712200        # Horse Racing
  default_source: auto
  auto_fetch: true                  # try Matchbook in auto mode when creds set
  default_place_fraction: 0.25
  default_places: 3
  poll_seconds: 120                 # market steam/drift polling interval
  pre_race_window_mins: 20          # only poll within N mins of off
  drift_reference_mins: 20          # Δ = odds_now - odds_20m_ago
  drift_abort_delta: 4.0            # abort value pick if Δ >= +4.0
  steam_kelly_multiplier: 1.25      # scale Kelly when steam detected
  steam_threshold_pct: 8.0          # shorten by ≥8% → steam trigger
  drift_threshold_pct: 10.0         # lengthen by ≥10% → drift trigger
  steam_min_odds: 1.5

# Audit log retention — never touches card_scores, snapshots, or paper_bets.
logging:
  retention:
    detailed_days: 30               # full ledger payloads + cron log sections
    brief_days: 120                   # compact summaries only; then purge

# Strict Phase 1 Validation Limits
model_training_guards:
  min_enrich_coverage_pct: 70.0
  phase1_critical_metrics:
    min_trainer_14d_coverage_pct: 50.0
    min_form_trip_coverage_pct: 80.0
    min_gate3_selectivity_pct: 25.0

batch_enrich_recovery:
  target_coverage_pct: 95.0

batch_enrich_recovery:
  target_coverage_pct: 95.0
