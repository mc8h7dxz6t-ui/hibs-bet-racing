  enabled: true
  date_slack_days: 1
  event_time_tolerance_sec: 120
  event_near_miss_sec: 600
  login_base: https://api.matchbook.com/bpapi/rest
  api_base: https://api.matchbook.com/edge/rest
  sport_id: 24735152712200
  default_source: auto
  auto_fetch: true
  default_place_fraction: 0.25
  default_places: 3
  poll_seconds: 120
  pre_race_window_mins: 20
  drift_reference_mins: 20
  drift_abort_delta: 4.0
  steam_kelly_multiplier: 1.25
  steam_threshold_pct: 8.0
  drift_threshold_pct: 10.0
  steam_min_odds: 1.5
