{# UI-only sport toggle — no effect on ranker, DQ gates, or paper ledger logic. #}
<style>
.hibs-product-bar{
    display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px;
    padding:8px 14px;margin-bottom:12px;
    background:rgba(6,14,24,0.92);border:1px solid var(--border);border-radius:10px;
}
.hibs-product-switch{display:inline-flex;border:1px solid rgba(148,163,184,0.25);border-radius:999px;overflow:hidden;}
.hibs-product-pill{
    padding:6px 14px;font-size:0.82em;font-weight:700;text-decoration:none;color:#cbd5e1;
    background:rgba(0,0,0,0.25);transition:background .15s,color .15s;
}
.hibs-product-pill:hover{background:rgba(0,122,51,0.2);color:#e2e8f0;}
.hibs-product-pill.active{background:linear-gradient(135deg,#007A33,#055a28);color:#fff;}
.hibs-harvested-logo-link{display:inline-flex;align-items:center;line-height:0;flex-shrink:0;}
.hibs-harvested-logo,.hibs-header-logo{height:56px;width:auto;max-width:min(420px,58vw);object-fit:contain;filter:drop-shadow(0 2px 12px rgba(0,0,0,0.35));}
.hibs-product-bar .hibs-harvested-logo{height:64px;max-width:min(480px,62vw);}
@media(max-width:640px){.hibs-harvested-logo,.hibs-header-logo{height:44px;}.hibs-product-bar .hibs-harvested-logo{height:48px;}}
</style>
<div class="hibs-product-bar" role="navigation" aria-label="HIBS products">
    {% from '_hibs_brand.html' import harvested_logo_link %}
    {{ harvested_logo_link(home_url=hibs_racing_home_url|default('/cards'), height=64) }}
    <div class="hibs-product-switch">
        <a href="{{ hibs_football_base_url }}/"
           class="hibs-product-pill {% if hibs_product_active == 'football' %}active{% endif %}"
           rel="noopener">⚽ Football</a>
        <a href="{{ hibs_racing_home_url|default('/cards') }}"
           class="hibs-product-pill {% if hibs_product_active == 'racing' %}active{% endif %}">🏇 Racing</a>
    </div>
</div>
