{# Racing paper-ledger summary bar #}
<div id="hibs-portfolio-bar" class="hibs-portfolio-bar" data-api-url="{{ portfolio_api_url | default('/api/portfolio/summary') }}">
    <div class="hibs-portfolio-inner">
        <span class="hibs-portfolio-label">Paper P&amp;L</span>
        <span class="hibs-portfolio-stat" id="pf-combined">—</span>
        <span class="hibs-portfolio-meta">verified ledger</span>
        <span class="hibs-portfolio-pill" id="pf-settled">— settled</span>
        <a class="hibs-portfolio-link" href="{{ url_for('tracker_page') }}">Track record →</a>
        <a class="hibs-portfolio-link" href="{{ portfolio_full_url | default('/portfolio') }}">Ledger</a>
    </div>
</div>
<script>
(function(){
    const bar = document.getElementById('hibs-portfolio-bar');
    if (!bar) return;
    const url = bar.dataset.apiUrl;
    const fmt = (v) => v == null ? '—' : ((v >= 0 ? '+' : '') + Number(v).toFixed(2) + 'u');
    async function refresh(){
        try {
            const r = await fetch(url, {credentials:'same-origin'});
            const j = await r.json();
            const comb = document.getElementById('pf-combined');
            const settled = document.getElementById('pf-settled');
            if (comb) {
                comb.textContent = fmt(j.racing_pnl_units);
                comb.classList.toggle('neg', j.racing_pnl_units != null && j.racing_pnl_units < 0);
            }
            if (settled) settled.textContent = (j.racing_settled ?? 0) + ' settled';
        } catch (_) {}
    }
    refresh();
    setInterval(refresh, 300000);
})();
</script>
