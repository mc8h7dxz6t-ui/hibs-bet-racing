paths:
  football: /opt/hibs-bet
  racing: /opt/hibs-racing
  trading: /opt/trading-core
  fve_docker: /opt/fve-stack

volumes:
  racing_sqlite: /mnt/hibs-racing-data
  fve_docker: /mnt/fve-data

