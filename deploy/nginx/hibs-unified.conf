# Unified hibs platform — reverse proxy for football + racing
#
# ⚠️  DEV ONLY — default upstream :5001 (Flask dev server).
# Production VPS (gunicorn football on :8000) MUST use deploy/hibs-bet.nginx.conf instead.
# Do NOT enable this site on hibs-bet.co.uk — causes public 502 (FM-01 cause 7).
#
# Default dev stack:
#   football  → 127.0.0.1:5001  (hibs-bet: PORT=5001 python src/hibs_predictor/web.py)
#   racing    → 127.0.0.1:5003  (hibs-racing: PORT=5003 hibs-racing web)
#
# Production VPS (gunicorn football on :8000):
#   Change upstream hibs_football to 127.0.0.1:8000 before enabling SSL.
#
# Install:
#   sudo bash deploy/nginx/apply-unified-nginx.sh
# Or manually:
#   sudo cp deploy/nginx/hibs-unified.conf /etc/nginx/sites-available/hibs-unified
#   sudo ln -sf /etc/nginx/sites-available/hibs-unified /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream hibs_football {
    server 127.0.0.1:5001;
    keepalive 8;
}

upstream hibs_racing {
    server 127.0.0.1:5003;
    keepalive 8;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP (dev / certbot challenge) -----------------------------------------
server {
    listen 80;
    server_name localhost hibs.local;

    client_max_body_size 4m;

    # Long-running card refresh / enrichment
    proxy_connect_timeout 120s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    # Public track record — read-only, cacheable (no auth on racing app)
    location = /tracker {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=120" always;
        add_header Access-Control-Allow-Origin * always;
    }

    location = /track-record {
        return 302 /dashboard/racing/tracker;
    }

    location ~ ^/dashboard/racing/api/tracker {
        rewrite ^/dashboard/racing/(.*)$ /$1 break;
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=120" always;
        add_header Access-Control-Allow-Origin * always;
    }

    location ~ ^/api/tracker {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=120" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # Portfolio + cross-app APIs — canonical on racing service
    location = /api/portfolio/summary {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/portfolio {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/market-steam {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
    }

    # Racing health + ranker attribution probes (monitoring lane)
    location ~ ^/dashboard/racing/api/(health|ranker/attribution|monitor|refresh) {
        rewrite ^/dashboard/racing/(.*)$ /$1 break;
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location /dashboard/racing/ {
        rewrite ^/dashboard/racing/(.*)$ /$1 break;
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dashboard/racing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/dashboard/football/api/(health|monitor) {
        rewrite ^/dashboard/football/(.*)$ /$1 break;
        proxy_pass http://hibs_football;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location /dashboard/football/ {
        rewrite ^/dashboard/football/(.*)$ /$1 break;
        proxy_pass http://hibs_football;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dashboard/football;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Root → football dashboard (adjust to /dashboard/racing/ if racing-first)
    location = / {
        return 302 /dashboard/football/;
    }

    location /health {
        default_type application/json;
        return 200 '{"ok":true,"proxy":"hibs-unified"}';
    }
}

