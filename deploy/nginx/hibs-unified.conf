# Unified hibs platform — single canonical domain
# Usage: sudo nginx -c /path/to/hibs-racing/deploy/nginx/hibs-unified.conf
# Or include this file from /etc/nginx/sites-enabled/

upstream hibs_football {
    server 127.0.0.1:5001;
}

upstream hibs_racing {
    server 127.0.0.1:5003;
}

server {
    listen 8080;
    server_name localhost;

    # Portfolio summary — canonical aggregator on racing service
    location /api/portfolio/summary {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    location /api/portfolio {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
    }

    location /api/market-steam {
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
    }

    location /dashboard/racing/ {
        rewrite ^/dashboard/racing/(.*)$ /$1 break;
        proxy_pass http://hibs_racing;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /dashboard/racing;
    }

    location /dashboard/football/ {
        rewrite ^/dashboard/football/(.*)$ /$1 break;
        proxy_pass http://hibs_football;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /dashboard/football;
    }

    location / {
        return 302 /dashboard/football/;
    }
}
