# Standalone Hibs Racing Intelligence — single-app nginx (no football proxy)
# App: PORT=5003 hibs-racing web  → 127.0.0.1:5003

upstream hibs_racing {
    server 127.0.0.1:5003;
    keepalive 8;
}

server {
    listen 80;
    server_name racing.example.com;

    client_max_body_size 4m;

    location /static/ {
        proxy_pass http://hibs_racing;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /api/tracker {
        proxy_pass http://hibs_racing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=120";
    }

    location /tracker {
        proxy_pass http://hibs_racing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://hibs_racing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

