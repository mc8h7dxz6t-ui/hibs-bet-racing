name: Gate regression

on:
  pull_request:
    paths:
      - "src/hibs_racing/**"
      - "tests/**"
      - "data/schema.sql"
      - "ingest/config.yaml"
      - ".github/workflows/gate-regression.yml"
  push:
    branches: [main, master]
  schedule:
    # Weekly Monday 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ranker,web]"
      - name: Pytest (gate + snapshot + institutional suite)
        run: pytest tests/test_snapshot_store.py tests/test_slippage_stress.py tests/test_gate_regression.py tests/test_gate2_sensitivity.py tests/test_gate_benchmark_walkforward.py tests/test_actionability_gate2.py tests/test_institutional.py -q

  gate-regression-cli:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ranker,web]"
      - name: Gate regression (requires local DB artifact)
        run: |
          echo "Scheduled job: run gate-regression on host with raceform DB + snapshots."
          echo "  python -m hibs_racing.cli snapshot-backfill --start ... --end ..."
          echo "  python -m hibs_racing.cli gate-regression --days 90 --require-snapshots"
        continue-on-error: true
